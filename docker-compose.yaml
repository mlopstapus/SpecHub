services:
  postgres:
    build: ./database
    environment:
      POSTGRES_USER: spechub
      POSTGRES_PASSWORD: spechub
      POSTGRES_DB: spechub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  spechub:
    build: ./legacy/backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://spechub:spechub@postgres:5432/spechub
      AUTH_TOKEN: dev-token-123
    depends_on:
      - postgres

  frontend:
    build: ./legacy/frontend
    environment:
      BACKEND_URL: http://spechub:8000
    ports:
      - "3000:3000"
    depends_on:
      - spechub

volumes:
  pgdata:
