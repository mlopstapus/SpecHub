services:
  database:
    build: ./database
    environment:
      # Overridable via a shell env var or a .env file next to this compose
      # file (e.g. POSTGRES_PASSWORD=<strong-password>) for a real self-hosted
      # deployment; the "skillcanon" fallback keeps local dev zero-config.
      POSTGRES_USER: ${POSTGRES_USER:-skillcanon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-skillcanon}
      POSTGRES_DB: ${POSTGRES_DB:-skillcanon}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-skillcanon} -d ${POSTGRES_DB:-skillcanon}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      # The app runtime connects as the least-privileged, RLS-subject role —
      # never the superuser MIGRATION_DATABASE_URL below uses (011-tenant-isolation-rls).
      DATABASE_URL: postgresql://skillcanon_app:${APP_DB_PASSWORD:-changeme_in_production}@database:5432/${POSTGRES_DB:-skillcanon}
      # Credential-resolution/bootstrap role (login, session/API-key auth,
      # invitation acceptance, org bootstrap) — narrower than the superuser,
      # but unrestricted-by-org within identity_access (011-tenant-isolation-rls).
      AUTH_DATABASE_URL: postgresql://skillcanon_auth:${AUTH_DB_PASSWORD:-changeme_in_production}@database:5432/${POSTGRES_DB:-skillcanon}
      MIGRATION_DATABASE_URL: postgresql://${POSTGRES_USER:-skillcanon}:${POSTGRES_PASSWORD:-skillcanon}@database:5432/${POSTGRES_DB:-skillcanon}
    depends_on:
      database:
        condition: service_healthy

volumes:
  pgdata:
