{{- if .Values.database.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "spechub.database.fullname" . }}
  labels:
    {{- include "spechub.labels" . | nindent 4 }}
    {{- include "spechub.database.selectorLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.postgresql.port }}
      targetPort: postgres
      protocol: TCP
      name: postgres
  selector:
    {{- include "spechub.database.selectorLabels" . | nindent 4 }}
{{- end }}
